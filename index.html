<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2027-1학기 교환학생 필터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',Arial,sans-serif;background:#f0f4f8;color:#1a1a2e;font-size:14px}

/* HEADER */
header{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;padding:18px 28px 14px}
header h1{font-size:18px;font-weight:800;letter-spacing:-.3px}
header p{font-size:11px;opacity:.75;margin-top:4px}

/* FILTER PANEL */
.filters{background:#fff;border-bottom:1px solid #dde3ea;padding:16px 28px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.fg select,.fg input{padding:6px 10px;border:1.5px solid #cbd5e1;border-radius:7px;font-size:13px;background:#fff;outline:none;transition:border .15s}
.fg select:focus,.fg input:focus{border-color:#2563eb}
.fg input[type=number]{width:90px}
.toggles{display:flex;flex-direction:column;gap:6px;justify-content:flex-end}
.toggle-lbl{display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap}
.toggle-lbl input{width:15px;height:15px;cursor:pointer;accent-color:#2563eb}
.toggle-lbl span{font-size:11px;font-weight:700}
.btns{display:flex;gap:8px;align-items:flex-end;margin-left:auto}
.btn{padding:7px 16px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-p{background:#2563eb;color:#fff}.btn-p:hover{background:#1d4ed8}
.btn-r{background:#e2e8f0;color:#475569}.btn-r:hover{background:#cbd5e1}

/* STAT BAR */
.statbar{background:#eef3f9;border-bottom:1px solid #dde3ea;padding:8px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.stats{display:flex;gap:16px;font-size:12px;color:#475569}
.stats strong{color:#1e40af;font-size:15px}
.sort-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#64748b}
.sort-row select{padding:3px 8px;border:1px solid #cbd5e1;border-radius:5px;font-size:12px}

/* TABLE */
.wrap{padding:0 28px 60px;overflow-x:auto}
table{width:100%;border-collapse:collapse;margin-top:12px;min-width:900px}
thead th{background:#1a3a6b;color:#fff;padding:9px 12px;font-size:11px;font-weight:700;text-align:left;position:sticky;top:0;z-index:10;white-space:nowrap}
tbody tr{border-bottom:1px solid #e8ecf1;cursor:pointer;transition:background .1s}
tbody tr:hover{background:#eff6ff!important}
td{padding:8px 12px;font-size:12px;vertical-align:top}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.b유럽{background:#dbeafe;color:#1e40af}
.b아시아{background:#dcfce7;color:#166534}
.b북미{background:#fef3c7;color:#92400e}
.b중남미{background:#ffe4e6;color:#9f1239}
.b오세아니아{background:#f3e8ff;color:#6b21a8}
.b기타{background:#f1f5f9;color:#475569}
.hist-3{background:#fee2e2;color:#991b1b}
.hist-2{background:#fef3c7;color:#92400e}
.major-ok{background:#dcfce7;color:#166534}
.major-biz{background:#ede9fe;color:#5b21b6}
.major-chk{background:#fef9c3;color:#713f12}
.major-bad{background:#fee2e2;color:#991b1b}
.major-likely{background:#dbeafe;color:#1e40af}

.univ-kr{font-weight:700;color:#1a3a6b;line-height:1.4;white-space:pre-line}
.univ-en{font-size:10px;color:#94a3b8;margin-top:1px;white-space:pre-line}
.rank-qs{font-weight:700;color:#1e40af;font-size:12px}
.rank-the{font-size:10px;color:#94a3b8}
.score-ok{color:#16a34a;font-weight:700}
.score-ng{color:#dc2626}
.to-num{font-weight:800;color:#2563eb;font-size:14px;text-align:center}
.btn-detail{background:#2563eb;color:#fff;border:none;border-radius:5px;padding:3px 9px;font-size:10px;cursor:pointer;white-space:nowrap}
.btn-detail:hover{background:#1d4ed8}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:680px;max-width:95vw;max-height:85vh;overflow-y:auto;padding:28px 32px;position:relative;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.modal-close{position:absolute;top:14px;right:14px;background:#f1f5f9;border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b}
.modal-close:hover{background:#e2e8f0}
.modal h2{font-size:17px;color:#1a3a6b;font-weight:800;white-space:pre-line;line-height:1.4}
.modal-sub{font-size:11px;color:#94a3b8;margin-top:3px;margin-bottom:18px}
.modal-sec{margin-bottom:16px}
.modal-sec h3{font-size:10px;font-weight:800;color:#2563eb;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e2e8f0}
.modal-sec p{font-size:12px;color:#374151;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.modal-links a{display:block;font-size:11px;color:#2563eb;text-decoration:none;margin-bottom:4px;word-break:break-all}
.modal-links a:hover{text-decoration:underline}
.modal-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.meta-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:6px 12px;font-size:11px}
.meta-item strong{display:block;color:#64748b;font-size:9px;text-transform:uppercase;margin-bottom:2px}
.meta-item span{font-weight:700;color:#1a3a6b}

.no-result{text-align:center;padding:60px;color:#94a3b8;font-size:14px}
</style>
</head>
<body>

<header>
  <h1>2027학년도 1학기 교환학생 프로그램</h1>
  <p>부산대학교 국제처 · 정규 1차 선발 · 129개 대학 · 이전기록 비인기 표시</p>
</header>

<div class="filters">
  <div class="fg">
    <label>대륙</label>
    <select id="f-cont">
      <option value="">전체</option>
      <option>유럽</option><option>아시아</option><option>북미</option><option>오세아니아</option><option>중남미</option>
    </select>
  </div>
  <div class="fg">
    <label>나라</label>
    <select id="f-country">
      <option value="">전체</option>

(웨일스)</option><option>오스트리아</option><option>이탈리아</option><option>인도네시아</option><option>일본</option><option>중국</option><option>중국
(홍콩)</option><option>체코</option><option>카자흐스탄</option><option>캐나다</option><option>튀르키예</option><option>폴란드</option><option>프랑스</option><option>핀란드</option><option>호주</option>
    </select>
  </div>
  <div class="fg">
    <label>언어</label>
    <select id="f-lang">
      <option value="">전체</option>
      <option>영어</option><option>일본어</option><option>중국어</option><option>독일어</option><option>스페인어</option><option>프랑스어</option><option>이탈리아어</option>
    </select>
  </div>
  <div class="fg">
    <label>QS 상한</label>
    <input type="number" id="f-qs" placeholder="예: 500">
  </div>
  <div class="fg">
    <label>내 TOEFL iBT</label>
    <input type="number" id="f-ibt" placeholder="예: 85" min="0" max="120">
  </div>
  <div class="fg">
    <label>최소 TO</label>
    <input type="number" id="f-to" placeholder="예: 3" min="1" max="20">
  </div>
  <div class="toggles">
    <label class="toggle-lbl">
      <input type="checkbox" id="f-hist" onchange="applyFilter()">
      <span style="color:#dc2626">🔴 이전 미달 학교만</span>
    </label>
    <label class="toggle-lbl">
      <input type="checkbox" id="f-biz" onchange="applyFilter()">
      <span style="color:#7c3aed">🎓 경영학과 지원가능만</span>
    </label>
  </div>
  <div class="btns">
    <button class="btn btn-p" onclick="applyFilter()">필터 적용</button>
    <button class="btn btn-r" onclick="resetFilter()">초기화</button>
  </div>
</div>

<div class="statbar">
  <div class="stats">
    <div>대학 <strong id="s-count">129</strong>개</div>
    <div>총원 <strong id="s-to">-</strong>명</div>
    <div>이전미달 <strong id="s-hist" style="color:#dc2626">-</strong>개교</div>
  </div>
  <div class="sort-row">
    정렬:
    <select id="sort-by" onchange="applyFilter()">
      <option value="qs">QS 랭킹순</option>
      <option value="the">THE 랭킹순</option>
      <option value="to" selected>모집인원순</option>
      <option value="country">나라순</option>
    </select>
  </div>
</div>

<div class="wrap">
  <table>
    <thead><tr>
      <th>#</th><th>대륙 / 나라</th><th>대학명</th><th>언어</th>
      <th>QS / THE</th><th>iBT 커트</th><th>모집<br>인원</th><th>이전기록</th><th>전공</th><th></th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="no-result" class="no-result" style="display:none">조건에 맞는 대학이 없습니다.</div>
</div>

<!-- 모달 -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="m-kr"></h2>
    <div class="modal-sub" id="m-en"></div>
    <div class="modal-meta" id="m-meta"></div>
    <div class="modal-sec"><h3>📋 자격기준</h3><p id="m-qual"></p></div>
    <div class="modal-sec"><h3>📁 세부사항 / 필요서류</h3><p id="m-detail"></p></div>
    <div class="modal-sec"><h3>📅 파견 학사일정</h3><p id="m-sched"></p></div>
    <div class="modal-sec modal-links"><h3>🔗 홈페이지</h3><div id="m-links"></div></div>
  </div>
</div>

function majorBadge(v) {
  const map = {
    'OK':['major-ok','제한없음'],
    'OK_경영':['major-biz','경영전공 OK'],
    'LIKELY_OK':['major-likely','전공매칭 권장'],
    'CHECK':['major-chk','세부확인'],
    'BAD':['major-bad','타전공 한정'],
  };
  const [cls,label] = map[v]||['major-ok',''];
  if(!label) return '';
  return `<span class="badge ${cls}" style="margin-top:3px">${label}</span>`;
}

function histBadge(v) {
  if(v==='3차미달') return `<span class="badge hist-3">3차미달</span>`;
  if(v==='2차미달') return `<span class="badge hist-2">2차미달</span>`;
  return '<span style="color:#cbd5e1;font-size:10px">-</span>';
}

function applyFilter() {
  const cont    = document.getElementById('f-cont').value;
  const country = document.getElementById('f-country').value;
  const lang    = document.getElementById('f-lang').value;
  const qs      = parseFloat(document.getElementById('f-qs').value);
  const ibt     = parseFloat(document.getElementById('f-ibt').value);
  const minTO   = parseInt(document.getElementById('f-to').value);
  const histOnly= document.getElementById('f-hist').checked;
  const bizOnly = document.getElementById('f-biz').checked;

  filtered = DATA.filter(d => {
    if (cont    && d['대륙'] !== cont) return false;
    if (country && d['파견국'].trim() !== country) return false;
    if (lang    && !d['언어'].includes(lang)) return false;
    if (!isNaN(qs)) { const q=parseInt(d['QS Ranking']); if(!isNaN(q)&&q>qs) return false; }
    if (!isNaN(minTO)) { const t=parseInt(d['TO']); if(!isNaN(t)&&t<minTO) return false; }
    if (!isNaN(ibt)) {
      const cut = d['iBT_커트'];
      if (cut !== '' && !isNaN(Number(cut)) && ibt < Number(cut)) return false;
    }
    if (histOnly && !d['이전기록']) return false;
    if (bizOnly  && d['전공판정'] === 'BAD') return false;
    return true;
  });

  const sb = document.getElementById('sort-by').value;
  filtered.sort((a,b) => {
    if(sb==='qs')  { const av=parseInt(a['QS Ranking']),bv=parseInt(b['QS Ranking']); if(isNaN(av)&&isNaN(bv))return 0; if(isNaN(av))return 1; if(isNaN(bv))return -1; return av-bv; }
    if(sb==='the') { const av=parseInt(a['THE 랭킹']),bv=parseInt(b['THE 랭킹']); if(isNaN(av)&&isNaN(bv))return 0; if(isNaN(av))return 1; if(isNaN(bv))return -1; return av-bv; }
    if(sb==='to')  { return (parseInt(b['TO'])||0)-(parseInt(a['TO'])||0); }
    if(sb==='country') return a['파견국'].localeCompare(b['파견국'],'ko');
    return 0;
  });

  render();
}

function render() {
  const tbody = document.getElementById('tbody');
  const noRes = document.getElementById('no-result');
  document.getElementById('s-count').textContent = filtered.length;

  const toMap = {};
  filtered.forEach(d => {
    const k = (d['대학명(영문)']||d['대학명(국문)']).trim();
    toMap[k] = Math.max(toMap[k]||0, parseInt(d['TO'])||0);
  });
  document.getElementById('s-to').textContent = Object.values(toMap).reduce((s,v)=>s+v,0);
  document.getElementById('s-hist').textContent = filtered.filter(d=>d['이전기록']).length;

  if(!filtered.length) { tbody.innerHTML=''; noRes.style.display='block'; return; }
  noRes.style.display='none';

  const ibt = parseFloat(document.getElementById('f-ibt').value);
  tbody.innerHTML = filtered.map((d,i) => {
    const qs  = d['QS Ranking'], the = d['THE 랭킹'];
    const qsH = (qs&&qs!=='') ? `<div class="rank-qs">QS ${qs}</div>` : '<div style="color:#cbd5e1;font-size:10px">-</div>';
    const theH= (the&&the!=='')? `<div class="rank-the">THE ${the}</div>` : '';

    const cut = d['iBT_커트'];
    let scoreH = '';
    if(cut!=='') {
      const ok = !isNaN(ibt) && ibt >= Number(cut);
      const cls = !isNaN(ibt) ? (ok?'score-ok':'score-ng') : '';
      const mark = !isNaN(ibt) ? (ok?' ✓':' ✗') : '';
      scoreH = `<span class="${cls}">iBT ${cut}${mark}</span>`;
    } else {
      scoreH = '<span style="color:#cbd5e1;font-size:10px">정보없음</span>';
    }

    const idx = DATA.indexOf(d);
    const rowBg = d['이전기록']==='3차미달' ? 'background:#fff5f5' :
                  d['이전기록']==='2차미달' ? 'background:#fffbeb' : '';
    return `<tr onclick="showModal(${idx})" style="${rowBg}">
      <td style="color:#94a3b8;font-size:11px;text-align:center">${i+1}</td>
      <td><span class="badge b${d['대륙']}">${d['대륙']}</span><div style="font-size:11px;color:#64748b;margin-top:3px">${d['파견국']}</div></td>
      <td style="min-width:160px"><div class="univ-kr">${d['대학명(국문)']}</div><div class="univ-en">${d['대학명(영문)']}</div></td>
      <td style="font-size:11px;white-space:pre-line;color:#475569">${d['언어']}</td>
      <td style="min-width:80px">${qsH}${theH}</td>
      <td>${scoreH}</td>
      <td class="to-num">${d['TO']||'-'}</td>
      <td>${histBadge(d['이전기록'])}</td>
      <td>${majorBadge(d['전공판정'])}</td>
      <td><button class="btn-detail" onclick="event.stopPropagation();showModal(${idx})">상세보기</button></td>
    </tr>`;
  }).join('');
}

function showModal(idx) {
  const d = DATA[idx];
  document.getElementById('m-kr').textContent = d['대학명(국문)'];
  document.getElementById('m-en').textContent = (d['대학명(영문)']||'') + '  ·  ' + d['파견국'] + '  ·  ' + (d['대륙']||'');
  document.getElementById('m-qual').textContent   = d['자격기준']||'-';
  document.getElementById('m-detail').textContent = d['세부사항']||'-';
  document.getElementById('m-sched').textContent  = d['파견대학 학사력']||'-';

  // 메타 정보
  const cut = d['iBT_커트']!=='' ? `iBT ${d['iBT_커트']}` : (d['IELTS_커트']!=='' ? `IELTS ${d['IELTS_커트']}` : '정보없음');
  const hist = d['이전기록'] || '이전기록없음';
  document.getElementById('m-meta').innerHTML = `
    <div class="meta-item"><strong>QS 랭킹</strong><span>${d['QS Ranking']||'-'}</span></div>
    <div class="meta-item"><strong>THE 랭킹</strong><span>${d['THE 랭킹']||'-'}</span></div>
    <div class="meta-item"><strong>모집인원</strong><span>${d['TO']||'-'}명</span></div>
    <div class="meta-item"><strong>어학 커트라인</strong><span>${cut}</span></div>
    <div class="meta-item"><strong>언어</strong><span>${d['언어']}</span></div>
    <div class="meta-item"><strong>이전기록</strong><span>${hist}</span></div>
    <div class="meta-item"><strong>학위과정</strong><span>${d['선발 학위과정']||'-'}</span></div>
    <div class="meta-item"><strong>학제</strong><span>${d['파견대학 학제']||'-'}</span></div>
  `;

  // 링크
  const links = (d['홈페이지']||'').split('\n').filter(l=>l.trim());
  document.getElementById('m-links').innerHTML = links.map(l => {
    const url = l.match(/https?:\/\/[^\s]+/) || l.match(/www\.[^\s]+/);
    if(!url) return `<span style="font-size:11px;color:#64748b">${l}</span>`;
    const href = url[0].startsWith('http') ? url[0] : 'http://'+url[0];
    const label = l.replace(url[0],'').replace(/[()（）]/g,'').trim() || url[0];
    return `<a href="${href}" target="_blank" rel="noopener">${label} ↗</a>`;
  }).join('') || '<span style="color:#cbd5e1">정보없음</span>';

  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); if(e.key==='Enter') applyFilter(); });

// 나라 선택 시 대륙 자동 연동
document.getElementById('f-country').addEventListener('change', function() {
  const country = this.value;
  if(!country) return;
  const found = DATA.find(d => d['파견국'].trim() === country);
  if(found) document.getElementById('f-cont').value = found['대륙'];
  applyFilter();
});
document.getElementById('f-cont').addEventListener('change', function() {
  document.getElementById('f-country').value = '';
  applyFilter();
});

applyFilter();
</script>
</body>
</html>
