let filtered = [...DATA];

function applyFilter() {
  const cont  = document.getElementById('f-cont').value;
  const lang  = document.getElementById('f-lang').value;
  const round = document.getElementById('f-round').value;
  const qs    = parseFloat(document.getElementById('f-qs').value);
  const ibt   = parseFloat(document.getElementById('f-ibt').value);
  const hasScore = !isNaN(ibt);
  const dupOnly = document.getElementById('f-dup').checked;
  const stableOnly = document.getElementById('f-stable').checked;
  const bizOnly = document.getElementById('f-biz').checked;
  // 중복 대학 키셋 (전체 DATA 기준)
  const roundsByUniv = {};
  DATA.forEach(d => {
    const key = (d['대학명(영문)'] || d['대학명(국문)']).trim();
    if (!roundsByUniv[key]) roundsByUniv[key] = new Set();
    roundsByUniv[key].add(d['선발차수']);
  });
  const dupUnivs = new Set(Object.keys(roundsByUniv).filter(k => roundsByUniv[k].size > 1));

  filtered = DATA.filter(d => {
    if (cont  && d['대륙'] !== cont) return false;
    if (lang  && !d['언어'].includes(lang)) return false;
    if (round && d['선발차수'] !== round) return false;
    if (!isNaN(qs)) {
      const q = parseInt(d['QS Ranking']);
      if (!isNaN(q) && q > qs) return false;
    }
    if (hasScore) {
      const cIBT = d['TOEFL_iBT_커트라인'], cITP = d['TOEFL_ITP_커트라인'], cIELTS = d['IELTS_커트라인'];
      if (cIBT === '' && cITP === '' && cIELTS === '') return true;
      let pass = false;
      if (!isNaN(ibt)   && cIBT   !== '' && ibt   >= cIBT)   pass = true;

      if (!pass) return false;
    }
    if (dupOnly && !dupUnivs.has((d['대학명(영문)'] || d['대학명(국문)']).trim())) return false;
    if (stableOnly && !isStable(d)) return false;
    if (bizOnly && d['전공판정'] === 'BAD') return false;
    return true;
  });

  const sb = document.getElementById('sort-by').value;
  filtered.sort((a, b) => {
    if (sb === 'qs')  { const av=parseInt(a['QS Ranking']), bv=parseInt(b['QS Ranking']); if(isNaN(av)&&isNaN(bv))return 0; if(isNaN(av))return 1; if(isNaN(bv))return -1; return av-bv; }
    if (sb === 'the') { const av=parseInt(a['THE 랭킹']),   bv=parseInt(b['THE 랭킹']);   if(isNaN(av)&&isNaN(bv))return 0; if(isNaN(av))return 1; if(isNaN(bv))return -1; return av-bv; }
    if (sb === 'country') return a['파견국'].localeCompare(b['파견국'], 'ko');
    return a['선발차수'].localeCompare(b['선발차수']);
  });

  render();
}

function render() {
  const tbody = document.getElementById('tbody');
  document.getElementById('count').textContent = filtered.length;
  // 중복 대학 표시용 (filtered 기준)
  const filteredRounds = {};
  filtered.forEach(d => {
    const key = (d['대학명(영문)'] || d['대학명(국문)']).trim();
    if (!filteredRounds[key]) filteredRounds[key] = new Set();
    filteredRounds[key].add(d['선발차수']);
  });
  const dupCount = Object.values(filteredRounds).filter(s => s.size > 1).length;
  document.getElementById('dup-count').textContent = dupCount;
  const toByUniv = {};
  filtered.forEach(d => {
    const key = (d['대학명(영문)'] || d['대학명(국문)']).trim();
    const to = parseInt(d['TO']) || 0;
    toByUniv[key] = Math.max(toByUniv[key] || 0, to);
  });
  const totalTO = Object.values(toByUniv).reduce((s, v) => s + v, 0);
  document.getElementById('total-to').textContent = totalTO;
  document.getElementById('no-result').style.display = filtered.length ? 'none' : 'block';
  if (!filtered.length) { tbody.innerHTML = ''; return; }

  const ibt   = parseFloat(document.getElementById('f-ibt').value);
  const hasScore = !isNaN(ibt);
  const dupOnly = document.getElementById('f-dup').checked;
  const stableOnly = document.getElementById('f-stable').checked;
  const bizOnly = document.getElementById('f-biz').checked;
  // 중복 대학 키셋 (전체 DATA 기준)
  const roundsByUniv = {};
  DATA.forEach(d => {
    const key = (d['대학명(영문)'] || d['대학명(국문)']).trim();
    if (!roundsByUniv[key]) roundsByUniv[key] = new Set();
    roundsByUniv[key].add(d['선발차수']);
  });
  const dupUnivs = new Set(Object.keys(roundsByUniv).filter(k => roundsByUniv[k].size > 1));

  tbody.innerHTML = filtered.map((d, i) => {
    const qs  = d['QS Ranking'];
    const the = d['THE 랭킹'];
    const qsHtml  = (qs  && qs  !== '') ? `<div class="rank-qs">QS ${qs}</div>`   : '<div style="color:#ccc;font-size:11px">-</div>';
    const theHtml = (the && the !== '') ? `<div class="rank-the">THE ${the}</div>` : '';

    const cIBT = d['TOEFL_iBT_커트라인'], cITP = d['TOEFL_ITP_커트라인'], cIELTS = d['IELTS_커트라인'];
    let scoreLines = [];
    if (cIBT !== '') {
      const ok = !isNaN(ibt) && ibt >= cIBT;
      scoreLines.push(`<span class="${hasScore && !isNaN(ibt) ? (ok?'ok':'ng') : ''}">iBT ${cIBT}${hasScore && !isNaN(ibt) ? (ok?' ✓':' ✗') : ''}</span>`);
    }

    if (!scoreLines.length) scoreLines.push('<span style="color:#bbb;font-size:11px">정보없음</span>');

    const idx = DATA.indexOf(d);
    return `<tr onclick="showModal(${idx})">
      <td class="td-num">${i+1}</td>
      <td><span class="badge b${d['선발차수']}">${d['선발차수']}</span></td>
      <td><span class="badge b${d['대륙']}">${d['대륙']}</span></td>
      <td style="font-size:12px;color:#555;white-space:nowrap">${d['파견국']}</td>
      <td><div class="univ-kr">${d['대학명(국문)']}</div><div class="univ-en">${d['대학명(영문)']}</div></td>
      <td style="font-size:12px;white-space:pre-line">${d['언어']}</td>
      <td style="text-align:center">${qsHtml}${theHtml}</td>
      <td class="td-score">${scoreLines.join('<br>')}</td>
      <td style="text-align:center;font-weight:700;color:#2e75b6">${d['TO']||'-'}</td>
      <td><button class="btn-detail" onclick="event.stopPropagation();showModal(${idx})">자세히</button></td>
    </tr>`;
  }).join('');
}

function showModal(idx) {
  const d = DATA[idx];
  document.getElementById('m-kr').textContent   = d['대학명(국문)'];
  document.getElementById('m-sub').textContent  = d['대학명(영문)'] + ' · ' + d['파견국'] + ' · ' + d['선발차수'];
  document.getElementById('m-qual').textContent   = d['자격기준'] || '-';
  document.getElementById('m-detail').textContent = d['세부사항'] || '-';
  document.getElementById('m-sched').textContent  = d['파견대학 학사력(학기) (변동 가능)'] || '-';

  const links = (d['홈페이지'] || '').split('\n').filter(l => l.trim());
  document.getElementById('m-links').innerHTML = links.map(l => {
    const um = l.match(/https?:\/\/[^\s]+/);
    if (um) { const lbl = l.replace(um[0],'').replace(/[()]/g,'').trim(); return `<a href="${um[0]}" target="_blank">${lbl||um[0]} ↗</a>`; }
    const wm = l.match(/www\.[^\s]+/);
    if (wm) { const lbl = l.replace(wm[0],'').replace(/[()]/g,'').trim(); return `<a href="http://${wm[0]}" target="_blank">${lbl||wm[0]} ↗</a>`; }
    return `<span style="font-size:12px;color:#666">${l}</span>`;
  }).join('') || '<span style="color:#bbb">정보없음</span>';

  document.getElementById('modal').classList.add('open');
}

function resetFilter() {
  ['f-cont','f-lang','f-round'].forEach(id => document.getElementById(id).value = '');
  ['f-qs','f-ibt'].forEach(id => document.getElementById(id).value = '');
  applyFilter();
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') applyFilter(); });
applyFilter();
